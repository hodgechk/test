<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="單字閃卡複習 PWA — 隨機抽題、即時翻譯確認，幫助你高效記憶英文單字。" />

  <!-- ✏️ 修改標題：改這裡 -->
  <title>單字閃卡複習</title>

  <!-- PWA 圖示與 Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="閃卡複習" />

  <meta name="theme-color" content="#7c6ef7" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0d0d1a;
      --bg-mid:     #13132a;
      --glass-bg:   rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
      --accent:     #7c6ef7;
      --accent-2:   #4fc3f7;
      --accent-glow: rgba(124,110,247,0.35);
      --text-primary: #f0f0ff;
      --text-muted:   #8888aa;
      --danger:     #f77c6e;
      --success:    #6ef7c0;
      --radius-lg:  20px;
      --radius-xl:  32px;
      --transition: 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ── Animated background orbs ───────────────────────────────────────────── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(124,110,247,0.25), transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(79,195,247,0.2), transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 14s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-50px, -60px); } }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .screen {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .hidden { display: none !important; }

    /* ── Glass card ──────────────────────────────────────────────────────────── */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03);
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Home screen ─────────────────────────────────────────────────────────── */
    .home-logo {
      font-size: 3rem;
      margin-bottom: 8px;
      display: block;
      text-align: center;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .home-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .home-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .num-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 28px;
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .num-input::-webkit-inner-spin-button,
    .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .num-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 16px;
      min-height: 20px;
      font-weight: 500;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    .btn:hover::after  { background: rgba(255,255,255,0.07); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #5b4de0 100%);
      color: #fff;
      box-shadow: 0 4px 24px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 6px 32px var(--accent-glow), 0 0 0 1px var(--accent); transform: translateY(-2px); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.11); transform: translateY(-2px); }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(124,110,247,0.4);
      color: var(--accent);
    }
    .btn-ghost:hover { background: var(--accent-glow); transform: translateY(-2px); }

    /* ── Quiz screen ─────────────────────────────────────────────────────────── */
    #quiz-screen .glass-card { padding: 32px 28px; }

    .progress-bar-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-text {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-bottom: 28px;
    }

    /* ── Flashcard ───────────────────────────────────────────────────────────── */
    #flashcard {
      background: linear-gradient(145deg, rgba(124,110,247,0.1), rgba(79,195,247,0.06));
      border: 1px solid rgba(124,110,247,0.2);
      border-radius: var(--radius-xl);
      padding: 48px 24px;
      text-align: center;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    #flashcard::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,110,247,0.12), transparent 70%);
      pointer-events: none;
    }

    #word {
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 2px;
      opacity: 0.6;
    }

    #translation {
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 600;
      color: var(--success);
      animation: fade-in 0.4s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .action-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Finish section */
    #finish-section {
      text-align: center;
    }
    .finish-emoji {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 12px;
      animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }
    .finish-title {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--success), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .finish-sub {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* Card entrance animation */
    .card-enter {
      animation: card-in 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateX(32px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    /* ── Unit Selection ──────────────────────────────────────────────────────── */
    .unit-selection-container {
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .select-all-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn-small {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-small:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--accent);
    }
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .checkbox-grid::-webkit-scrollbar,
    .wrong-list-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .checkbox-grid::-webkit-scrollbar-track,
    .wrong-list-scroll::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 3px;
    }
    .checkbox-grid::-webkit-scrollbar-thumb,
    .wrong-list-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    .checkbox-grid::-webkit-scrollbar-thumb:hover,
    .wrong-list-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .checkbox-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(124, 110, 247, 0.3);
    }
    .checkbox-item input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .checkbox-label-text {
      font-size: 0.85rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loading-text {
      grid-column: span 2;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 20px 0;
    }

    /* ── POS Tag & Grade Buttons ─────────────────────────────────────────────── */
    #pos-tag {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-2);
      background: rgba(79, 195, 247, 0.1);
      border: 1px solid rgba(79, 195, 247, 0.25);
      border-radius: 30px;
      padding: 4px 12px;
      margin-top: 4px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--danger) 0%, #d85243 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(247, 124, 110, 0.2);
    }
    .btn-danger:hover {
      box-shadow: 0 6px 24px rgba(247, 124, 110, 0.35), 0 0 0 1px var(--danger);
      transform: translateY(-2px);
    }
    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #46cf98 100%);
      color: #0b2d1f;
      box-shadow: 0 4px 16px rgba(110, 247, 192, 0.2);
    }
    .btn-success:hover {
      box-shadow: 0 6px 24px rgba(110, 247, 192, 0.35), 0 0 0 1px var(--success);
      transform: translateY(-2px);
    }

    /* ── Result Screen ────────────────────────────────────────────────────────── */
    #result-screen {
      text-align: center;
      animation: fade-in 0.4s ease;
    }
    .result-stats {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 24px 0;
    }
    .stat-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-box {
      background: radial-gradient(circle at top, rgba(124, 110, 247, 0.15), transparent);
      border-color: rgba(124, 110, 247, 0.3);
      padding: 24px;
    }
    .score-box .stat-num {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-box-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .success-box {
      border-color: rgba(110, 247, 192, 0.2);
      background: radial-gradient(circle at top, rgba(110, 247, 192, 0.08), transparent);
    }
    .success-box .stat-num {
      color: var(--success);
      font-size: 2rem;
      font-weight: 700;
    }
    .danger-box {
      border-color: rgba(247, 124, 110, 0.2);
      background: radial-gradient(circle at top, rgba(247, 124, 110, 0.08), transparent);
    }
    .danger-box .stat-num {
      color: var(--danger);
      font-size: 2rem;
      font-weight: 700;
    }
    .stat-lbl {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }
    .wrong-answers-section {
      text-align: left;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 24px;
    }
    .wrong-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      border-left: 3px solid var(--danger);
      padding-left: 8px;
    }
    .wrong-list-scroll {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 6px;
    }
    .wrong-item {
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      font-size: 0.95rem;
    }
    .wrong-word {
      font-weight: 700;
      color: #fff;
      font-size: 1.05rem;
    }
    .play-btn-small {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 4px;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
    }
    .play-btn-small:hover {
      opacity: 1;
      transform: scale(1.15);
    }
    .wrong-pos {
      font-size: 0.75rem;
      color: var(--accent-2);
      background: rgba(79, 195, 247, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
      justify-self: end;
      font-weight: 600;
    }
    .wrong-trans {
      grid-column: span 3;
      font-size: 0.9rem;
      color: var(--success);
      border-top: 1px dashed rgba(255, 255, 255, 0.05);
      padding-top: 6px;
      margin-top: 2px;
    }
    .perfect-msg {
      text-align: center;
      font-weight: 600;
      color: var(--success);
      padding: 24px 0;
      font-size: 1.05rem;
    }

    /* ── Responsive tweaks ───────────────────────────────────────────────────── */
    @media (max-width: 420px) {
      .glass-card { padding: 28px 20px; }
      #flashcard  { padding: 36px 16px; min-height: 180px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════
       HOME SCREEN
  ══════════════════════════════════════════════════ -->
  <section id="home-screen" class="screen">
    <div class="glass-card">
      <!-- ✏️ 修改主頁大圖示：直接換掉下方的 emoji 符號即可，例如 🧠 📚 🎯 ✏️ 🌟 -->
      <span class="home-logo" aria-hidden="true">📖</span>

      <!-- ✏️ 修改主標題文字：改這裡 -->
      <h1 class="home-title">單字閃卡複習</h1>
      <p class="home-subtitle">隨機抽題 · 即時翻譯確認 · 高效記憶</p>

      <!-- Unit Selection -->
      <div class="unit-selection-container">
        <span class="label">選擇出題單元</span>
        <div class="select-all-row">
          <button id="select-all-btn" type="button" class="btn-small">全選</button>
          <button id="deselect-all-btn" type="button" class="btn-small">全不選</button>
        </div>
        <div id="unit-checkboxes" class="checkbox-grid">
          <div class="loading-text">載入題庫中...</div>
        </div>
      </div>

      <label class="label" for="count-input">本次出題數量 (10 ~ 500)</label>
      <input
        id="count-input"
        class="num-input"
        type="number"
        min="10"
        max="500"
        value="10"
        aria-label="出題數量"
      />

      <p id="error-msg" class="error-msg" hidden aria-live="polite"></p>

      <button id="start-btn" class="btn btn-primary" disabled>
        <span>開始測驗</span>
        <span aria-hidden="true">→</span>
      </button>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════
       QUIZ SCREEN
  ══════════════════════════════════════════════════ -->
  <section id="quiz-screen" class="screen hidden">
    <div class="glass-card">

      <!-- Quiz Content Wrapper (hidden when finished) -->
      <div id="quiz-content">
        <!-- Progress -->
        <div class="progress-bar-wrap" aria-hidden="true">
          <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
        </div>
        <p id="progress" class="progress-text" aria-live="polite"></p>

        <!-- Flashcard -->
        <div id="flashcard" role="region" aria-label="閃卡">
          <span id="word" aria-label="英文單字"></span>
          <button id="speak-btn" class="hidden" style="background: none; border: none; font-size: 2rem; cursor: pointer;">🔊</button>
          <div class="divider" id="card-divider" aria-hidden="true"></div>
          <span id="pos-tag" class="hidden" aria-label="詞性"></span>
          <span id="translation" class="hidden" aria-label="中文翻譯"></span>
        </div>

        <!-- Action buttons -->
        <div class="action-area">
          <button id="show-answer-btn" class="btn btn-secondary">👁 看答案</button>

          <!-- Self-grade buttons (shown after clicking show-answer-btn) -->
          <div id="self-grade-buttons" class="hidden" style="display: flex; gap: 12px; width: 100%;">
            <button id="grade-wrong-btn" class="btn btn-danger">❌ 忘記了</button>
            <button id="grade-right-btn" class="btn btn-success">✅ 記住了</button>
          </div>
        </div>
      </div>

      <!-- Result Screen (shown when finished) -->
      <div id="result-screen" class="hidden">
        <span class="finish-emoji" aria-hidden="true">🎉</span>
        <p class="finish-title">測驗結束！</p>
        
        <div class="result-stats">
          <div class="stat-box score-box">
            <span class="stat-num" id="result-score">0</span>
            <span class="stat-lbl">得分</span>
          </div>
          <div class="stat-box-row">
            <div class="stat-box success-box">
              <span class="stat-num" id="result-correct">0</span>
              <span class="stat-lbl">答對</span>
            </div>
            <div class="stat-box danger-box">
              <span class="stat-num" id="result-wrong">0</span>
              <span class="stat-lbl">答錯</span>
            </div>
          </div>
        </div>

        <div id="wrong-answers-container" class="wrong-answers-section">
          <h3 class="wrong-title">錯題檢視</h3>
          <div id="wrong-list" class="wrong-list-scroll">
            <!-- Dynamically populated -->
          </div>
        </div>

        <button id="back-home-btn" class="btn btn-ghost">↩ 回到主頁</button>
      </div>

    </div>
  </section>

  <!-- 註冊 JavaScript -->
  <script src="app.js"></script>

  <!-- 註冊 Service Worker（PWA 離線支援） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW 註冊失敗:', err));
      });
    }
  </script>
</body>
</html>
